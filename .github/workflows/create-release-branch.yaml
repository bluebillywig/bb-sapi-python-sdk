name: Create release branch
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version - major.minor only (e.g. 1.2)"
        required: true
        type: string

jobs:
  create-release-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format '${{ inputs.version }}'. Expected major.minor (e.g. 1.2)"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Create release branch
        run: |
          git checkout -b "release/v${{ inputs.version }}"
          git push origin "release/v${{ inputs.version }}"
